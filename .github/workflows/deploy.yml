name: Deploy Railway

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Produção · Railway
    if: >-
      vars.RAILWAY_DEPLOY_ENABLED == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - name: Baixar o código aprovado pela CI
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configurar Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Publicar no Railway
        run: >-
          npx --yes @railway/cli@5.27.2 up --ci
          --environment production
          --service observatorio-educacao-rs

      - name: Verificar o endereço público
        run: curl --fail --retry 5 --retry-delay 5 https://observatorio-educacao-rs-production.up.railway.app/
