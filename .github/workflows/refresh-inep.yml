name: Atualização oficial Inep

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-inep-${{ github.ref }}
  cancel-in-progress: false

jobs:
  official-data:
    name: Planilhas oficiais · Python 3.12
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Baixar o código
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configurar Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Restaurar o snapshot real de IDEB e SAEB
        run: python ingestion/load_ideb_snapshot.py

      - name: Baixar e validar rendimento e TDI oficiais
        run: python ingestion/extract_inep.py

      - name: Construir e testar o produto de dados
        run: |
          dbt build --project-dir dbt --profiles-dir dbt
          python viz/make_charts.py
          python viz/build_dashboard.py
          python -m pytest

      - name: Preservar dados, proveniência e evidências
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: inep-oficial-${{ github.run_id }}
          path: |
            data/bronze/indicadores.parquet
            data/bronze/inep_provenance.json
            dbt/target/run_results.json
            dbt/logs/dbt.log
            public/
            assets/*.png
          if-no-files-found: ignore
          retention-days: 14

      - name: Abrir PR com a atualização publicável
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="automation/inep-refresh-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add public/ viz/dashboard.html viz/arquitetura.html
          if git diff --cached --quiet; then
            echo "Nenhuma alteração publicável encontrada." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git commit -m "Atualiza indicadores oficiais do Inep"
          git push --set-upstream origin "$branch"
          url=$(gh pr create --base main --head "$branch" \
            --title "Atualiza indicadores oficiais do Inep" \
            --body "Atualiza os gráficos e as páginas com o histórico completo de rendimento e TDI publicado pelo Inep. A proveniência e os resultados do pipeline estão anexados à execução da Action.")
          echo "PR criado: $url" >> "$GITHUB_STEP_SUMMARY"
