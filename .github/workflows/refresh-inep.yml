name: Atualização oficial Inep

on:
  workflow_dispatch:
    inputs:
      years:
        description: "Ano ou intervalo inclusivo (ex.: 2025 ou 2023:2025); vazio = histórico completo"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: refresh-inep-${{ github.ref }}
  cancel-in-progress: false

jobs:
  official-data:
    name: Planilhas oficiais · Python 3.12
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Baixar o código
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configurar Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Criar IDEB sintético para exercitar o pipeline sem credenciais
        run: python tests/fixtures/make_bronze.py

      - name: Baixar e validar rendimento e TDI oficiais
        env:
          YEARS: ${{ inputs.years }}
        run: |
          if [ -n "$YEARS" ]; then
            python ingestion/extract_inep.py --years "$YEARS"
          else
            python ingestion/extract_inep.py
          fi

      - name: Construir e testar o produto de dados
        run: |
          dbt build --project-dir dbt --profiles-dir dbt
          python viz/make_charts.py
          python viz/build_dashboard.py
          python -m pytest

      - name: Preservar dados, proveniência e evidências
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: inep-oficial-${{ github.run_id }}
          path: |
            data/bronze/indicadores.parquet
            data/bronze/inep_provenance.json
            dbt/target/run_results.json
            dbt/logs/dbt.log
            public/
            assets/*.png
          if-no-files-found: ignore
          retention-days: 14
