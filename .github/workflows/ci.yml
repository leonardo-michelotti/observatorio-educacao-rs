name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline-offline:
    name: Pipeline offline · Python 3.12
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar o código
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configurar Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Configurar Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm

      - name: Instalar testes do navegador
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Validar Python
        run: |
          python -m ruff check ingestion viz tests run_pipeline.py
          python -m compileall -q ingestion viz tests run_pipeline.py

      - name: Criar bronze sintético
        run: python tests/fixtures/make_bronze.py

      - name: Construir modelos e executar testes dbt
        run: dbt build --project-dir dbt --profiles-dir dbt

      - name: Gerar gráficos e páginas
        run: |
          python viz/make_charts.py
          python viz/build_dashboard.py

      - name: Executar testes de integração
        run: |
          python -m pytest
          npm run test:e2e

      - name: Preservar evidências da execução
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pipeline-offline-${{ github.run_id }}
          path: |
            dbt/target/run_results.json
            dbt/logs/dbt.log
            public/
            assets/*.png
            test-results/
          if-no-files-found: ignore
          retention-days: 7
